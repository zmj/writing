<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
  <div class="post-list">
{{- range .Months }}
    <div class="month-group">
      <div class="month-label">{{ .Label }}</div>
      <div class="month-posts">
{{- range .Posts }}
        <a href="/{{ .Slug }}/">{{ .Title }}</a>
{{- end }}
      </div>
    </div>
{{- end }}
  </div>
</main>
</body>
</html>
